name: CI — Oracle LLM

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  validate-manifests:
    name: Validate Kubernetes manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Install kubectl directly — avoids the deprecated azure/setup-kubectl action
      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl
          kubectl version --client

      - name: Dry-run ollama deployment
        run: kubectl apply --dry-run=client --validate=false -f ollama-deployment.yaml

      - name: Dry-run monitoring stack
        run: kubectl apply --dry-run=client --validate=false -f monitoring-fixed.yaml

  lint-python:
    name: Lint compare script
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install flake8 openai requests tabulate

      # Check the file exists before linting so CI gives a clear error if path is wrong
      - name: Check compare script exists
        run: |
          test -f compare_models.py || (echo "ERROR: compare_models.py not found" && exit 1)

      - name: Lint
        run: flake8 compare_models.py --max-line-length=120 --ignore=E501,W503

  build-image:
    name: Build Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (without pushing)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: oracle-llm:${{ github.sha }}

  push-image:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: [validate-manifests, build-image]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/oracle-llm:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/oracle-llm:${{ github.sha }}
