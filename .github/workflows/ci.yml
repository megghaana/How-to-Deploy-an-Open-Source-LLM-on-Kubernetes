name: CI — Oracle LLM

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  validate-manifests:
    name: Validate Kubernetes manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -L -o kubeconform.tar.gz https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform.tar.gz
          sudo mv kubeconform /usr/local/bin/kubeconform
          kubeconform -v

      - name: Validate ollama deployment
        run: kubeconform -strict -summary ollama-deployment.yaml

      - name: Validate monitoring stack
        run: kubeconform -strict -summary monitoring-fixed.yaml

  lint-python:
    name: Lint compare script
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install flake8 openai requests tabulate

      # Check the file exists before linting so CI gives a clear error if path is wrong
      - name: Check compare script exists
        run: |
          test -f compare_models.py || (echo "ERROR: compare_models.py not found" && exit 1)

      - name: Lint
        run: flake8 compare_models.py --max-line-length=120 --ignore=E501,W503

  build-image:
    name: Build Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (without pushing)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: oracle-llm:${{ github.sha }}

  push-image:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: [validate-manifests, build-image]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      IMAGE_NAME: oracle-llm
    steps:
      - uses: actions/checkout@v4

      - name: Check Docker Hub secrets
        id: docker-tags
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          test -n "$DOCKERHUB_USERNAME" || (echo "ERROR: Missing repository secret DOCKERHUB_USERNAME" && exit 1)
          test -n "$DOCKERHUB_TOKEN" || (echo "ERROR: Missing repository secret DOCKERHUB_TOKEN" && exit 1)
          echo "latest=${DOCKERHUB_USERNAME}/${IMAGE_NAME}:latest" >> "$GITHUB_OUTPUT"
          echo "sha=${DOCKERHUB_USERNAME}/${IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.docker-tags.outputs.latest }}
            ${{ steps.docker-tags.outputs.sha }}
